<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

  <!-- SEO & App Meta -->
  <title>Guardian Pharmacy - Your Trusted Healthcare Partner</title>
  <meta name="description"
    content="Guardian Pharmacy - Order authentic medicines, book lab tests, and schedule doctor appointments. Your trusted partner in healthcare." />
  <meta name="keywords"
    content="pharmacy, medicines, lab tests, doctor appointments, healthcare, Guardian Pharmacy, Thiruvarur" />
  <meta name="author" content="Guardian Pharmacy" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Guardian Pharmacy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Guardian Pharmacy" />
  <meta name="msapplication-TileColor" content="#2563eb" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- Favicon & Icons -->
  <link rel="shortcut icon" type="image/png" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Guardian Pharmacy" />
  <meta property="og:description"
    content="Your trusted partner in healthcare. Order medicines, book lab tests, and schedule doctor appointments." />
  <meta property="og:image" content="/icons/icon-512x512.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
